<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zzz.id.vn - Tên miền đang được rao bán</title>
  <meta name="description" content="Tên miền zzz.id.vn đang được rao bán. Liên hệ Telegram @hoangmobiledev để thương lượng." />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #263b73 0%, #101522 45%, #080b12 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 28px;
      padding: 54px 34px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
    }

    .badge {
      display: inline-block;
      margin-bottom: 22px;
      padding: 9px 16px;
      border-radius: 999px;
      background: rgba(52, 211, 153, 0.16);
      color: #86efac;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(42px, 9vw, 88px);
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 18px;
      background: linear-gradient(90deg, #ffffff, #93c5fd, #a7f3d0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      font-size: clamp(21px, 3vw, 32px);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .desc {
      max-width: 560px;
      margin: 0 auto 34px;
      color: #cbd5e1;
      font-size: 17px;
      line-height: 1.7;
    }

    .contact-box {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 18px;
      background: #229ed9;
      color: #ffffff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 16px 40px rgba(34, 158, 217, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .contact-box:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 50px rgba(34, 158, 217, 0.48);
    }

    .note {
      margin-top: 26px;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .card {
        padding: 42px 22px;
        border-radius: 22px;
      }

      .contact-box {
        width: 100%;
        justify-content: center;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Tên miền đang được rao bán</div>
    <h1>zzz.id.vn</h1>
    <p class="subtitle">Tên miền ngắn, dễ nhớ, phù hợp cho thương hiệu số.</p>
    <p class="desc">
      Tên miền <strong>zzz.id.vn</strong> hiện đang mở bán. Nếu bạn quan tâm hoặc muốn thương lượng giá, vui lòng liên hệ trực tiếp qua Telegram.
    </p>
    <a class="contact-box" href="https://t.me/hoangmobiledev" target="_blank" rel="noopener noreferrer">
      Liên hệ Telegram: @hoangmobiledev
    </a>
    <p class="note">Ưu tiên giao dịch nhanh, rõ ràng và an toàn.</p>
  </main>
</body>
</html>
